<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Coração de Partículas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        svg { display: none; }
    </style>
</head>
<body>
    <svg width="600" height="552" viewBox="0 0 600 552">
        <path d="M300 150 C 300 150 200 50 100 100 C 0 150 50 300 300 500 C 550 300 600 150 500 100 C 400 50 300 150 300 150 Z"></path>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. CONFIGURAÇÃO DO THREE.JS
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 400;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. CAPTURA DO SVG E PREPARAÇÃO DOS PONTOS
        const path = document.querySelector("path");
        const length = path.getTotalLength();
        const vertices = [];

        const geometry = new THREE.BufferGeometry();
        const step = 0.4; 
        const positions = new Float32Array(Math.ceil(length / step) * 3);

        // 3. APENAS UM LOOP: Calculando as posições originais
        for (let i = 0; i < length; i += step) {
            const point = path.getPointAtLength(i);
            
            const vector = new THREE.Vector3(point.x - 300, -point.y + 250, 0);
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 30;
            
            vertices.push(vector);
        }

        // 4. A ANIMAÇÃO CORRETA DA TIMELINE
        const tl = gsap.timeline({
            repeat: -1,       
            yoyo: true,       
            repeatDelay: 1.5  // Espera 1.5s com o coração montado
        });

        tl.from(vertices, {
            x: 0,
            y: 0,
            z: 0,
            ease: "power2.inOut",
            duration: 1.5,
            stagger: {
                amount: 2     // As partículas terminam de explodir do centro em no máximo 2s
            }
        });

        // 5. APLICANDO O MATERIAL E COLOCANDO NA TELA
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0xff0044, size: 2 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        function animate() {
            requestAnimationFrame(animate);

            const positionAttribute = geometry.attributes.position;
            for(let i = 0; i < vertices.length; i++) {
                positionAttribute.setXYZ(i, vertices[i].x, vertices[i].y, vertices[i].z);
            }
            positionAttribute.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();

        // 6. AJUSTE RESPONSIVO
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
